<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>skinslides - Ambient Video Player</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            font-family: sans-serif;
        }
        .screen-container {
            display: flex;
            gap: 20px;
        }
        .screen {
            width: 320px;
            height: 568px;
            background-color: #000;
            object-fit: contain;
            border: 1px solid #222; /* 確認用の薄い枠線 */
        }
        #player-4 {
            display: none;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            letter-spacing: 2px;
        }
        .title {
            font-size: 2rem;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }
        .start-btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .start-btn:hover {
            background-color: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <div class="title">skinslides AI Logic</div>
        <div class="start-btn">Click to Start Sequence</div>
    </div>

    <!-- 可視3画面 -->
    <div class="screen-container">
        <video id="player-1" class="screen" muted playsinline></video>
        <video id="player-2" class="screen" muted playsinline></video>
        <video id="player-3" class="screen" muted playsinline></video>
    </div>
    
    <!-- 音声用/不可視第4画面 -->
    <video id="player-4" playsinline></video>

    <!-- ※ローカル環境テスト用のダミーパス等に対応するため、実際の動画配置ディレクトリに合わせて変更してください -->
    <script>const VIDEO_BASE_PATH = "videos/";</script>
    <script src="player.js"></script>
    <script src="logic.js"></script>
</body>
</html>
