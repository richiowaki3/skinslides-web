<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>skinslides - Ambient Video Player</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            font-family: sans-serif;
        }
        .screen-container {
            display: flex;
            gap: 20px;
        }
        .screen-wrapper {
            position: relative;
            width: 320px;
            height: 568px; 
            background-color: #000;
            overflow: hidden;
            border: 1px solid #222; /* 確認用の薄い枠線 */
        }
        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 568px; /* ラップ枠の高さに合わせる */
            height: 320px; /* ラップ枠の幅に合わせる */
            transform: translate(-50%, -50%) rotate(90deg);
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .screen.playing {
            opacity: 1;
        }
        #player-4 {
            display: none;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            letter-spacing: 2px;
        }
        .title {
            font-size: 2rem;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }
        .start-btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .start-btn:hover {
            background-color: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <div class="title">skinslides AI Logic</div>
        <div class="start-btn">Click to Start Sequence</div>
    </div>

    <!-- 可視3画面 (鬣フレーム・90度回転) -->
    <div class="screen-container">
        <div class="screen-wrapper">
            <video id="player-1" class="screen" muted playsinline></video>
        </div>
        <div class="screen-wrapper">
            <video id="player-2" class="screen" muted playsinline></video>
        </div>
        <div class="screen-wrapper">
            <video id="player-3" class="screen" muted playsinline></video>
        </div>
    </div>
    
    <!-- 音声用/不可視第4プレイヤー（HTML5 Audio） -->
    <audio id="player-4"></audio>

    <!-- メディアパスの設定 -->
    <script>
        const R2_BASE_URL = 'https://pub-b863fe2ba58a4525be0263e22ceb85a5.r2.dev/';
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        const VIDEO_BASE_PATH = R2_BASE_URL;
        const AUDIO_BASE_PATH = isLocal ? "audios/" : R2_BASE_URL;
    </script>
    <script src="player.js"></script>
    <script src="logic.js"></script>
</body>
</html>
